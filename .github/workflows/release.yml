name: Release

on:
  push:
    tags:
      - 'v*'

# Allow the workflow's GITHUB_TOKEN to create the GitHub Release + upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      TEAM_ID: FA2WUDBFB8
    steps:
      - uses: actions/checkout@v4

      # XcodeGen emits an objectVersion-77 project (Xcode 16.3+); select the
      # newest stable Xcode so xcodebuild can read it.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$CERT_P12_BASE64" | openssl base64 -d -A > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project MacScrub.xcodeproj \
            -scheme MacScrub \
            -archivePath build/MacScrub.xcarchive \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MacScrub.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize and staple the app
        env:
          API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
          API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/ac_api_key.p8"
          echo "$API_KEY_P8_BASE64" | openssl base64 -d -A > "$KEY_PATH"
          ditto -c -k --keepParent "build/export/MacScrub.app" "$RUNNER_TEMP/MacScrub.zip"
          xcrun notarytool submit "$RUNNER_TEMP/MacScrub.zip" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple "build/export/MacScrub.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "MacScrub" \
            --window-size 560 360 \
            --icon-size 96 \
            --icon "MacScrub.app" 150 180 \
            --app-drop-link 410 180 \
            --no-internet-enable \
            "MacScrub-${GITHUB_REF_NAME}.dmg" \
            "build/export/MacScrub.app"

      - name: Sign DMG
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            "MacScrub-${GITHUB_REF_NAME}.dmg"
          codesign -dvv "MacScrub-${GITHUB_REF_NAME}.dmg" 2>&1 | grep -i "Authority=Developer ID" || true

      - name: Notarize and staple the DMG
        env:
          API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/ac_api_key.p8"
          DMG="MacScrub-${GITHUB_REF_NAME}.dmg"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG" || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true

      # Push the updated cask to the maintainer's tap so `brew upgrade` picks up
      # the new release. Runs last: if the token is missing/expired this fails
      # loudly, but the DMG + GitHub Release have already published above.
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="MacScrub-${GITHUB_REF_NAME}.dmg"
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tufantunc/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/macscrub.rb << EOF
          cask "macscrub" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/tufantunc/MacScrub/releases/download/v#{version}/MacScrub-v#{version}.dmg"
            name "MacScrub"
            desc "Temporary input lock for safely cleaning your keyboard and trackpad"
            homepage "https://github.com/tufantunc/MacScrub"

            depends_on macos: :sonoma

            app "MacScrub.app"

            zap trash: [
              "~/Library/Caches/com.macscrub.app",
              "~/Library/Preferences/com.macscrub.app.plist",
              "~/Library/Saved Application State/com.macscrub.app.savedState",
            ]
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macscrub.rb
          git commit -m "macscrub ${VERSION}" || echo "no change"
          git push origin HEAD
