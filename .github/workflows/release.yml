name: Release

on:
  push:
    tags:
      - 'v*'

# Allow the workflow's GITHUB_TOKEN to create the GitHub Release + upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # XcodeGen emits an objectVersion-77 project (Xcode 16.3+); select the
      # newest stable Xcode so xcodebuild can read it.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>mac-application</string>
              <key>signing</key>
              <dict>
                  <key>style</key>
                  <string>adhoc</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project MacScrub.xcodeproj \
            -scheme MacScrub \
            -archivePath build/MacScrub.xcarchive \
            MARKETING_VERSION="${GITHUB_REF_NAME#v}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MacScrub.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "MacScrub" \
            --window-size 560 360 \
            --icon-size 96 \
            --icon "MacScrub.app" 150 180 \
            --app-drop-link 410 180 \
            --no-internet-enable \
            "MacScrub-${GITHUB_REF_NAME}.dmg" \
            "build/export/MacScrub.app"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
