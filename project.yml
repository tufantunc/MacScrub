name: MacScrub
options:
  bundleIdPrefix: com.macscrub
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Sign with a stable Apple Development identity (not ad-hoc "-") so the
    # code signature's designated requirement is identity-based rather than
    # pinned to the per-build cdhash. This keeps the Accessibility (TCC) grant
    # valid across rebuilds instead of re-prompting on every launch.
    DEVELOPMENT_TEAM: FA2WUDBFB8
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  MacScrub:
    type: application
    platform: macOS
    sources:
      - MacScrub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macscrub.app
        INFOPLIST_FILE: MacScrub/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies: []
    info:
      path: MacScrub/App/Info.plist
      properties:
        # Run as a menu-bar accessory: no Dock icon. The main window is still
        # shown on launch (the app activates itself via NSApp.activate).
        LSUIElement: true
        # Keep the short version tied to the MARKETING_VERSION build setting so
        # the value matches the published git tag at build time.
        CFBundleShortVersionString: $(MARKETING_VERSION)

  MacScrubTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MacScrubTests
    dependencies:
      - target: MacScrub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macscrub.tests
        GENERATE_INFOPLIST_FILE: "YES"
